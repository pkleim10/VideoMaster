name: VideoMaster
options:
  bundleIdPrefix: com.videomaster
  deploymentTarget:
    macOS: "26.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  VideoMaster:
    type: application
    platform: macOS
    sources:
      - path: VideoMaster
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.videomaster.VideoMaster
        MARKETING_VERSION: "0.4.1"
        CURRENT_PROJECT_VERSION: "79"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_CFBundleDisplayName: VideoMaster
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: VideoMaster/VideoMaster.entitlements
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5"
    dependencies:
      - package: GRDB
        product: GRDB
